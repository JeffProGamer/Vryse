<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaTube</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Roboto', system-ui, sans-serif;
            background: #0a0a0a;
            color: #fff;
        }
        
        .topbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 56px;
            background: #0a0a0a;
            border-bottom: 1px solid #27272a;
            display: flex;
            align-items: center;
            padding: 0 16px;
            z-index: 100;
        }
        .sidebar {
            position: fixed;
            left: 0;
            top: 56px;
            width: 240px;
            height: calc(100vh - 56px);
            background: #0a0a0a;
            border-right: 1px solid #27272a;
            overflow-y: auto;
            z-index: 90;
        }
        .nav-item {
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 24px;
            cursor: pointer;
        }
        .nav-item:hover { background: #27272a; }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            padding: 24px;
            margin-left: 240px;
        }
        .thumbnail {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
        }
        .thumbnail img {
            width: 100%;
            height: 158px;
            object-fit: cover;
        }
        .duration {
            position: absolute;
            bottom: 8px; right: 8px;
            background: rgba(0,0,0,0.85);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 12px;
        }
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .clip-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
            padding: 24px;
            margin-left: 240px;
        }
    </style>
</head>
<body>

<div class="topbar">
    <div style="display:flex; align-items:center; justify-content:space-between; width:100%; max-width:1400px; margin:0 auto;">
        <div style="display:flex; align-items:center; gap:16px;">
            <button onclick="toggleSidebar()" style="padding:12px; background:none; border:none; color:white; font-size:1.3rem;">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div style="display:flex; align-items:center; gap:8px;">
                <i class="fa-solid fa-play" style="font-size:28px; color:#ef4444;"></i>
                <span style="font-weight:700; font-size:24px;">NovaTube</span>
            </div>
        </div>

        <div style="flex:1; max-width:600px; margin:0 40px;">
            <input id="search" type="text" placeholder="Search NovaTube" 
                   style="width:100%; background:#18181b; border:1px solid #3f3f46; border-radius:9999px; padding:10px 20px 10px 50px; color:white;">
        </div>

        <div style="display:flex; align-items:center; gap:16px;">
            <button onclick="showUpload()" style="display:flex; align-items:center; gap:8px; padding:8px 16px; background:#18181b; border:1px solid #3f3f46; border-radius:9999px; cursor:pointer;">
                <i class="fa-solid fa-video"></i>
                <span>Upload</span>
            </button>
            <button style="font-size:1.4rem; background:none; border:none; color:white;"><i class="fa-solid fa-bell"></i></button>
            <div onclick="myChannel()" style="width:32px; height:32px; background:#8b5cf6; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; cursor:pointer;">U</div>
        </div>
    </div>
</div>

<!-- Sidebar -->
<div id="sidebar" class="sidebar">
    <div onclick="showHome()" class="nav-item"><i class="fa-solid fa-house"></i><span>Home</span></div>
    <div onclick="showClips()" class="nav-item"><i class="fa-solid fa-bolt"></i><span>Clips</span></div>
    <div class="nav-item"><i class="fa-solid fa-fire"></i><span>Trending</span></div>
    <div class="nav-item"><i class="fa-solid fa-users"></i><span>Subscriptions</span></div>
</div>

<!-- Home -->
<div id="home" class="video-grid"></div>

<!-- Clips -->
<div id="clips-page" class="clip-grid hidden"></div>

<!-- Upload Modal -->
<div id="upload-modal" class="modal">
    <div style="background:#18181b; width:90%; max-width:420px; border-radius:16px; padding:24px;">
        <h2 style="margin-bottom:20px; font-size:24px;">Upload to NovaTube</h2>
        <input id="title" type="text" placeholder="Video title" style="width:100%; padding:14px; background:#27272a; border:none; border-radius:8px; margin-bottom:12px; color:white;">
        <textarea id="desc" placeholder="Description" style="width:100%; height:100px; padding:14px; background:#27272a; border:none; border-radius:8px; color:white;"></textarea>
        
        <button onclick="uploadNow()" style="width:100%; margin-top:20px; padding:16px; background:#ef4444; color:white; border:none; border-radius:8px; font-weight:600; cursor:pointer;">
            Upload Video
        </button>
        <button onclick="hideUpload()" style="width:100%; margin-top:8px; padding:16px; background:transparent; border:1px solid #52525b; color:white; border-radius:8px; cursor:pointer;">
            Cancel
        </button>
    </div>
</div>

<script>
// REAL PERSISTENT SAVING WITH localStorage
let videos = JSON.parse(localStorage.getItem('novatube_videos')) || [
    {id:1, title:"I Spent 100 Days in Roblox Doors", channel:"KreekCraft", views:"3.2M", time:"2h ago", duration:"22:45", thumb:"https://picsum.photos/id/1015/320/180", type:"video"},
    {id:2, title:"Brookhaven RP Gone Wrong", channel:"ItsFunneh", views:"2.1M", time:"11h ago", duration:"15:30", thumb:"https://picsum.photos/id/133/320/180", type:"video"},
    {id:3, title:"Crazy Roblox Glitch", channel:"Roblox", views:"984K", time:"4h ago", duration:"0:45", thumb:"https://picsum.photos/id/201/180/320", type:"clip"}
];

function saveToStorage() {
    localStorage.setItem('novatube_videos', JSON.stringify(videos));
}

function renderHome() {
    const container = document.getElementById('home');
    container.innerHTML = '';
    videos.filter(v => v.type === "video").forEach(v => {
        const div = document.createElement('div');
        div.style.cursor = "pointer";
        div.innerHTML = `
            <div class="thumbnail">
                <img src="${v.thumb}" alt="">
                <div class="duration">${v.duration}</div>
            </div>
            <div style="display:flex; gap:12px; margin-top:12px;">
                <div style="width:36px; height:36px; background:#ef4444; border-radius:50%;"></div>
                <div style="flex:1;">
                    <div style="font-weight:500; line-height:1.3;">${v.title}</div>
                    <div style="color:#a1a1aa; font-size:14px; margin-top:6px;">${v.channel}</div>
                    <div style="color:#a1a1aa; font-size:14px;">${v.views} views • ${v.time}</div>
                </div>
            </div>
        `;
        div.onclick = () => alert(`▶ Playing: ${v.title}`);
        container.appendChild(div);
    });
}

function renderClips() {
    const container = document.getElementById('clips-page');
    container.innerHTML = '';
    videos.filter(v => v.type === "clip").forEach(v => {
        const div = document.createElement('div');
        div.style.cursor = "pointer";
        div.innerHTML = `
            <div class="thumbnail" style="height:280px;">
                <img src="${v.thumb}" style="height:100%; width:100%; object-fit:cover;" alt="">
            </div>
            <div style="margin-top:10px; font-weight:500;">${v.title}</div>
            <div style="color:#a1a1aa; font-size:14px;">${v.channel}</div>
        `;
        div.onclick = () => alert(`▶ Playing Clip: ${v.title}`);
        container.appendChild(div);
    });
}

function showUpload() {
    document.getElementById('upload-modal').style.display = 'flex';
}

function hideUpload() {
    document.getElementById('upload-modal').style.display = 'none';
}

function uploadNow() {
    const title = document.getElementById('title').value.trim() || "Untitled Video";
    
    const newVideo = {
        id: Date.now(),
        title: title,
        channel: "Your Channel",
        views: "Just now",
        time: "Just now",
        duration: "10:00",
        thumb: "https://picsum.photos/id/237/320/180",
        type: "video"
    };
    
    videos.unshift(newVideo);
    saveToStorage();
    renderHome();
    hideUpload();
    alert("✅ Video Uploaded & SAVED permanently in your browser!");
}

function toggleSidebar() {
    const sb = document.getElementById('sidebar');
    sb.style.transform = (sb.style.transform === 'translateX(0px)') ? 'translateX(-240px)' : 'translateX(0px)';
}

function showHome() {
    document.getElementById('home').classList.remove('hidden');
    document.getElementById('clips-page').classList.add('hidden');
    renderHome();
}

function showClips() {
    document.getElementById('home').classList.add('hidden');
    document.getElementById('clips-page').classList.remove('hidden');
    renderClips();
}

function myChannel() {
    alert("Your NovaTube Channel\n\nAll your uploads are saved in this browser.");
}

// Initialize
window.onload = () => {
    renderHome();
    console.log("%cNovaTube Loaded - Videos saved with localStorage", "color:#ef4444; font-size:16px");
};
</script>
</body>
</html>
