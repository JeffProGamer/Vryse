<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaTube</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Roboto', system-ui, sans-serif;
            background: #0a0a0a;
            color: #fff;
        }
        .topbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 56px;
            background: #0a0a0a;
            border-bottom: 1px solid #27272a;
            display: flex;
            align-items: center;
            padding: 0 16px;
            z-index: 100;
        }
        .sidebar {
            position: fixed;
            left: 0;
            top: 56px;
            width: 240px;
            height: calc(100vh - 56px);
            background: #0a0a0a;
            border-right: 1px solid #27272a;
            overflow-y: auto;
            z-index: 90;
        }
        .nav-item {
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 24px;
            cursor: pointer;
        }
        .nav-item:hover { background: #27272a; }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            padding: 24px;
            margin-left: 240px;
        }
        .thumbnail {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
        }
        .thumbnail img {
            width: 100%;
            height: 158px;
            object-fit: cover;
        }
        .shorts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
            padding: 24px;
            margin-left: 240px;
        }
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
    </style>
</head>
<body>

<div class="topbar">
    <div style="display:flex; align-items:center; justify-content:space-between; width:100%; max-width:1400px; margin:0 auto;">
        <div style="display:flex; align-items:center; gap:16px;">
            <button onclick="toggleSidebar()" style="padding:12px; background:none; border:none; color:white; font-size:1.3rem;">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div style="display:flex; align-items:center; gap:8px;">
                <i class="fa-solid fa-play" style="font-size:28px; color:#ef4444;"></i>
                <span style="font-weight:700; font-size:24px;">NovaTube</span>
            </div>
        </div>

        <div style="flex:1; max-width:600px; margin:0 40px;">
            <input id="search" type="text" placeholder="Search" style="width:100%; background:#18181b; border:1px solid #3f3f46; border-radius:9999px; padding:10px 20px 10px 50px; color:white;">
        </div>

        <div style="display:flex; align-items:center; gap:12px;">
            <button onclick="showUpload()" style="display:flex; align-items:center; gap:8px; padding:8px 16px; background:#18181b; border:1px solid #3f3f46; border-radius:9999px; cursor:pointer;">
                <i class="fa-solid fa-video"></i><span>Upload</span>
            </button>
            
            <div id="user-section" style="display:flex; align-items:center; gap:12px; cursor:pointer;" onclick="showLoginModal()">
                <span id="username-display" style="font-size:14px;">Sign in</span>
                <div id="avatar" style="width:32px;height:32px;background:#8b5cf6;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;">U</div>
            </div>
        </div>
    </div>
</div>

<!-- Sidebar -->
<div id="sidebar" class="sidebar">
    <div onclick="showHome()" class="nav-item"><i class="fa-solid fa-house"></i><span>Home</span></div>
    <div onclick="showShorts()" class="nav-item"><i class="fa-solid fa-bolt text-yellow-400"></i><span>Shorts</span></div>
    <div class="nav-item"><i class="fa-solid fa-fire"></i><span>Trending</span></div>
    <div class="nav-item"><i class="fa-solid fa-users"></i><span>Subscriptions</span></div>
    <hr style="margin:16px 24px; border-color:#27272a;">
    <div onclick="showMyChannel()" class="nav-item"><i class="fa-solid fa-user"></i><span>Your Channel</span></div>
</div>

<!-- Home -->
<div id="home" class="video-grid"></div>

<!-- Shorts -->
<div id="shorts-page" class="shorts-grid hidden"></div>

<!-- Login Modal -->
<div id="login-modal" class="modal">
    <div style="background:#18181b; width:90%; max-width:400px; border-radius:16px; padding:32px;">
        <h2 style="text-align:center; margin-bottom:24px;">Sign in to NovaTube</h2>
        
        <input id="login-username" type="text" placeholder="Username" style="width:100%; padding:14px; margin-bottom:12px; background:#27272a; border:none; border-radius:8px; color:white;">
        <input id="login-password" type="password" placeholder="Password" style="width:100%; padding:14px; margin-bottom:20px; background:#27272a; border:none; border-radius:8px; color:white;">
        
        <button onclick="loginUser()" style="width:100%; padding:14px; background:#ef4444; border:none; border-radius:8px; color:white; font-weight:600; margin-bottom:12px;">Sign In</button>
        <button onclick="switchToSignup()" style="width:100%; padding:14px; background:transparent; border:1px solid #52525b; border-radius:8px; color:white;">Create Account</button>
        
        <div onclick="hideLoginModal()" style="text-align:center; margin-top:20px; color:#a1a1aa; cursor:pointer;">Cancel</div>
    </div>
</div>

<!-- Signup Modal -->
<div id="signup-modal" class="modal">
    <div style="background:#18181b; width:90%; max-width:400px; border-radius:16px; padding:32px;">
        <h2 style="text-align:center; margin-bottom:24px;">Create NovaTube Account</h2>
        
        <input id="signup-username" type="text" placeholder="Choose username" style="width:100%; padding:14px; margin-bottom:12px; background:#27272a; border:none; border-radius:8px; color:white;">
        <input id="signup-password" type="password" placeholder="Password" style="width:100%; padding:14px; margin-bottom:20px; background:#27272a; border:none; border-radius:8px; color:white;">
        
        <button onclick="signupUser()" style="width:100%; padding:14px; background:#22c55e; border:none; border-radius:8px; color:white; font-weight:600; margin-bottom:12px;">Create Account</button>
        <button onclick="switchToLogin()" style="width:100%; padding:14px; background:transparent; border:1px solid #52525b; border-radius:8px; color:white;">Already have account? Sign in</button>
        
        <div onclick="hideLoginModal()" style="text-align:center; margin-top:20px; color:#a1a1aa; cursor:pointer;">Cancel</div>
    </div>
</div>

<script>
// Persistent data
let currentUser = JSON.parse(localStorage.getItem('novatube_current_user')) || null;
let users = JSON.parse(localStorage.getItem('novatube_users')) || {};
let videos = JSON.parse(localStorage.getItem('novatube_videos')) || [
    {id:1, title:"I Spent 100 Days in Roblox Doors", channel:"KreekCraft", views:"3.2M", time:"2h ago", duration:"22:45", thumb:"https://picsum.photos/id/1015/320/180", type:"video"},
    {id:3, title:"When you hit Door 100...", channel:"Roblox", views:"1.4M", time:"5h ago", duration:"0:42", thumb:"https://picsum.photos/id/201/180/320", type:"short"}
];

function saveAll() {
    localStorage.setItem('novatube_current_user', JSON.stringify(currentUser));
    localStorage.setItem('novatube_videos', JSON.stringify(videos));
}

function updateUI() {
    const display = document.getElementById('username-display');
    const avatar = document.getElementById('avatar');
    
    if (currentUser) {
        display.textContent = currentUser.username;
        avatar.textContent = currentUser.username[0].toUpperCase();
        avatar.style.background = "#22c55e";
    } else {
        display.textContent = "Sign in";
        avatar.textContent = "U";
        avatar.style.background = "#8b5cf6";
    }
}

function showLoginModal() {
    if (currentUser) {
        alert("You are logged in as " + currentUser.username);
        return;
    }
    document.getElementById('login-modal').style.display = 'flex';
}

function hideLoginModal() {
    document.getElementById('login-modal').style.display = 'none';
    document.getElementById('signup-modal').style.display = 'none';
}

function loginUser() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    
    if (users[username] && users[username].password === password) {
        currentUser = {username: username};
        saveAll();
        updateUI();
        hideLoginModal();
        alert("✅ Welcome back, " + username + "!");
    } else {
        alert("❌ Wrong username or password");
    }
}

function signupUser() {
    const username = document.getElementById('signup-username').value.trim();
    const password = document.getElementById('signup-password').value;
    
    if (!username || !password) {
        alert("Please fill all fields");
        return;
    }
    
    if (users[username]) {
        alert("Username already taken");
        return;
    }
    
    users[username] = {password: password};
    localStorage.setItem('novatube_users', JSON.stringify(users));
    
    currentUser = {username: username};
    saveAll();
    updateUI();
    hideLoginModal();
    alert("✅ Account created! Welcome to NovaTube, " + username);
}

function switchToSignup() {
    document.getElementById('login-modal').style.display = 'none';
    document.getElementById('signup-modal').style.display = 'flex';
}

function switchToLogin() {
    document.getElementById('signup-modal').style.display = 'none';
    document.getElementById('login-modal').style.display = 'flex';
}

function showUpload() {
    if (!currentUser) {
        alert("You must sign in to upload videos!");
        showLoginModal();
        return;
    }
    const title = prompt("Enter video title:");
    if (!title) return;
    
    const isShort = confirm("Is this a Short? (Vertical video)");
    
    videos.unshift({
        id: Date.now(),
        title: title,
        channel: currentUser.username,
        views: "Just now",
        time: "Just now",
        duration: isShort ? "0:45" : "12:00",
        thumb: "https://picsum.photos/id/237/320/180",
        type: isShort ? "short" : "video"
    });
    saveAll();
    alert("✅ Uploaded successfully as " + currentUser.username + "!");
    showHome();
}

function showHome() {
    document.getElementById('home').classList.remove('hidden');
    document.getElementById('shorts-page').classList.add('hidden');
    renderHome();
}

function showShorts() {
    document.getElementById('home').classList.add('hidden');
    document.getElementById('shorts-page').classList.remove('hidden');
    renderShorts();
}

function renderHome() {
    const container = document.getElementById('home');
    container.innerHTML = '';
    videos.filter(v => v.type === "video").forEach(v => {
        const div = document.createElement('div');
        div.style.cursor = "pointer";
        div.innerHTML = `
            <div class="thumbnail"><img src="${v.thumb}"><div class="duration">${v.duration}</div></div>
            <div style="display:flex; gap:12px; margin-top:12px;">
                <div style="width:36px;height:36px;background:#ef4444;border-radius:50%;"></div>
                <div>
                    <div style="font-weight:500;">${v.title}</div>
                    <div style="color:#a1a1aa;font-size:14px;">${v.channel}</div>
                    <div style="color:#a1a1aa;font-size:14px;">${v.views} • ${v.time}</div>
                </div>
            </div>
        `;
        div.onclick = () => alert(`Playing: ${v.title}`);
        container.appendChild(div);
    });
}

function renderShorts() {
    const container = document.getElementById('shorts-page');
    container.innerHTML = '';
    videos.filter(v => v.type === "short").forEach(v => {
        const div = document.createElement('div');
        div.style.cursor = "pointer";
        div.innerHTML = `
            <img src="${v.thumb}" style="width:100%;height:280px;object-fit:cover;border-radius:12px;">
            <div style="margin-top:8px;font-weight:500;">${v.title}</div>
            <div style="color:#a1a1aa;">${v.channel}</div>
        `;
        div.onclick = () => alert(`Playing Short: ${v.title}`);
        container.appendChild(div);
    });
}

function showMyChannel() {
    if (!currentUser) {
        alert("Sign in to view your channel");
        showLoginModal();
        return;
    }
    alert(`Welcome to your channel, ${currentUser.username}!\n\nYour uploaded videos appear here.`);
}

function toggleSidebar() {
    const sb = document.getElementById('sidebar');
    sb.style.transform = (sb.style.transform === 'translateX(0px)') ? 'translateX(-240px)' : 'translateX(0px)';
}

// Init
window.onload = () => {
    updateUI();
    renderHome();
};
</script>
</body>
</html>
